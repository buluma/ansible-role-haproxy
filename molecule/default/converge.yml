---
- name: Converge
  hosts: all
  become: true
  gather_facts: true

  pre_tasks:
    - name: Generate self-signed cert for https frontend test
      ansible.builtin.command: >
        openssl req -x509 -nodes -days 365 -newkey rsa:2048
        -keyout /tmp/haproxy.key -out /tmp/haproxy.crt
        -subj "/CN=localhost"
      args:
        creates: /tmp/haproxy.crt

    - name: Concatenate cert and key into haproxy pem bundle
      ansible.builtin.shell: cat /tmp/haproxy.crt /tmp/haproxy.key > /tmp/haproxy.keycrt
      args:
        creates: /tmp/haproxy.keycrt

  roles:
    - haproxy_backend_default_balance: roundrobin
      haproxy_backends:
        - balance: roundrobin
          httpcheck: true
          name: backend
          options:
            - check
          port: 8080
          servers: "{{ groups['all'] }}"
        - balance: leastconn
          mode: tcp
          name: smtp_backend
          port: 25
          servers:
            - address: 127.0.0.1
              name: first
              port: 25
            - address: 127.0.0.2
              name: second
              port: 25
        - http_send_name_header: X-Server-Name
          httpcheck: GET /v1/sys/health HTTP/1.1
          mode: tcp
          name: vault
          options:
            - check
            - check-ssl
            - ssl verify none
          port: 8200
          servers: "{{ groups['all'] }}"
      haproxy_frontends:
        - address: "*"
          default_backend: backend
          name: http
          port: 80
        - address: "*"
          crts:
            - /tmp/haproxy.keycrt
          default_backend: backend
          name: https
          port: 443
          ssl: true
        - address: "*"
          default_backend: smtp_backend
          mode: tcp
          name: smtp
          port: 25
      haproxy_listen_default_balance: roundrobin
      haproxy_listens:
        - address: "*"
          balance: roundrobin
          httpcheck: true
          listen_port: 8081
          name: listen
          options:
            - maxconn 100000
          port: 8080
          servers: "{{ groups['all'] }}"
      role: buluma.haproxy
